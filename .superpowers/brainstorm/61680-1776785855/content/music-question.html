<h2>Background music — do you have an audio file?</h2>
<p class="subtitle">The original invitation has a music toggle button in the top-right corner.</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Yes, I have an audio file</h3>
      <p>I'll provide an MP3 or similar file to bundle with the site.</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Skip music for now</h3>
      <p>Build without music — I can add it later.</p>
    </div>
  </div>
</div>
